display_name: SSH Ops
short_description: 35 SSH tools for remote Linux server ops — inventory, files, services, packages, cron, docker, metrics, network, IP assignment, profiles, jump chain, process management.
long_description: |
  SSH Ops provides 35 MCP tools for operating remote Linux servers over SSH.
  Covers hardware inventory, health checks, system metrics (/proc, no agent),
  disk reports, log search, network probing (ping/port/TLS), TCP ping without auth,
  file read/write/patch/diff (binary-safe), local script execution, scp file
  transfer, systemd service control, package management (apt/yum/dnf/apk
  auto-detect), crontab CRUD, Docker container management, environment variable
  management, process listing and kill, user management (add/del/mod/passwd/lock),
  chmod+chown+chgrp, sudoers management via /etc/sudoers.d/, parallel multi-host
  execution with group targeting, IP address assignment (permanent, all network
  stacks), dynamic profile management with AES-256-GCM encrypted passwords,
  profile inheritance and command allowlists, SSH -J jump chain management,
  and SSH key discovery. Uses your local ssh binary and existing keys.
default_prompt: Run a health check on my production server with SSH Ops.
example_prompts:
  - Check my server hardware with SSH Ops.
  - Run a health check across all my servers.
  - Install nginx on my production server.
  - Search nginx logs for errors in the last hour.
  - Add a daily backup cron job on my server.
  - Can my app server reach the database on port 5432?
  - Read /etc/nginx/nginx.conf on production.
  - Replace line 5 in /etc/hosts with a new entry.
  - Add a new server with password login to SSH Ops profiles.
  - Remove the staging server from SSH Ops profiles.
  - Add a jump/bastion server to the SSH hop chain.
  - Assign two static IPs to eth0 on my production server permanently.
  - List available SSH keys on this machine.
  - Check TCP connectivity to my server without SSH auth.
  - Show me live CPU and memory metrics from my server.
  - Compare /etc/nginx/nginx.conf between production and staging.
  - Kill all node processes on my server.
  - Set the JAVA_HOME environment variable on production.
  - List all running Docker containers on my server.
  - Restart the nginx container on production.
  - Transfer my local backup script to the server and run it.
